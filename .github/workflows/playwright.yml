name: Mundus Trade — Playwright Audit

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - visual-audit
          - auth
          - dashboard
          - offers
          - customers
          - negotiations
          - sales

  schedule:
    - cron: '0 8 * * *'

jobs:
  playwright-audit:
    name: Playwright Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run selected tests
        run: |
          SUITE="${{ github.event.inputs.test_suite }}"
          if [ "$SUITE" = "visual-audit" ]; then
            npx playwright test tests/mundus/09-visual-audit.spec.js
          elif [ "$SUITE" = "auth" ]; then
            npx playwright test tests/mundus/01-auth.spec.js
          elif [ "$SUITE" = "dashboard" ]; then
            npx playwright test tests/mundus/02-dashboard.spec.js
          elif [ "$SUITE" = "offers" ]; then
            npx playwright test tests/mundus/03-offers.spec.js
          elif [ "$SUITE" = "customers" ]; then
            npx playwright test tests/mundus/04-customers.spec.js
          elif [ "$SUITE" = "negotiations" ]; then
            npx playwright test tests/mundus/05-negotiations.spec.js
          elif [ "$SUITE" = "sales" ]; then
            npx playwright test tests/mundus/06-sales.spec.js
          else
            npx playwright test
          fi
        env:
          BASE_URL: https://app.mundustrade.us
          SUPPLIER_EMAIL: ${{ secrets.SUPPLIER_EMAIL }}
          SUPPLIER_PASSWORD: ${{ secrets.SUPPLIER_PASSWORD }}
          BUYER_EMAIL: ${{ secrets.BUYER_EMAIL }}
          BUYER_PASSWORD: ${{ secrets.BUYER_PASSWORD }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload failure videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-videos-${{ github.run_number }}
          path: test-results/
          retention-days: 7