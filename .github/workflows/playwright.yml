name: Mundus Trade — Playwright Audit

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Which tests to run'
        required: true
        default: 'visual-audit'
        type: choice
        options:
          - visual-audit
          - auth
          - all

  schedule:
    - cron: '0 8 * * *'

jobs:
  playwright-audit:
    name: Playwright Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run tests
        run: |
          SUITE="${{ github.event.inputs.test_suite }}"
          if [ "$SUITE" = "visual-audit" ]; then
            bunx playwright test tests/mundus/09-visual-audit.spec.js --project="Desktop Chrome"
          elif [ "$SUITE" = "auth" ]; then
            bunx playwright test tests/mundus/01-auth.spec.js --project="Desktop Chrome"
          else
            bunx playwright test --project="Desktop Chrome"
          fi
        env:
          BASE_URL: https://app.mundustrade.us
          SUPPLIER_EMAIL: ${{ secrets.SUPPLIER_EMAIL }}
          SUPPLIER_PASSWORD: ${{ secrets.SUPPLIER_PASSWORD }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
